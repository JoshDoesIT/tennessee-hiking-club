name: 🐛 Bug report
description: Report something that isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '…'
        2. Click '…'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: url
    attributes:
      label: URL / page
      placeholder: /trails/virgin-falls
  - type: dropdown
    id: device
    attributes:
      label: Device
      options: ["Desktop", "Mobile", "Tablet"]
  - type: input
    id: env
    attributes:
      label: Browser & OS
      placeholder: Safari 18 on iOS 18
