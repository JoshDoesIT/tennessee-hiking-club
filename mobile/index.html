<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Tennessee Hiking Club</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: grid;
        place-items: center;
        /* Match the launch splash so the offline screen feels continuous. */
        background: #2a3623;
        color: #fbf6e9;
        text-align: center;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        padding: calc(2rem + env(safe-area-inset-top)) 2rem
          calc(2rem + env(safe-area-inset-bottom));
      }
      main {
        max-width: 28rem;
      }
      .mark {
        font-size: 2.5rem;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.5rem;
        line-height: 1.6;
        color: #d8d3c2;
      }
      button {
        font: inherit;
        font-weight: 600;
        color: #2a3623;
        background: #e0a24c;
        border: 0;
        border-radius: 0.75rem;
        padding: 0.75rem 1.5rem;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      button:active {
        background: #c8852f;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">⛰️</div>
      <h1>You're offline</h1>
      <p>
        Tennessee Hiking Club needs a connection to open. Reconnect to the
        internet, then try again. Already-saved trails and hikes are waiting
        inside.
      </p>
      <button type="button" id="retry">Try again</button>
    </main>
    <script>
      // Re-attempt the hosted app. Capacitor serves this page from the local
      // bundle only when the launch navigation fails, so going back means
      // navigating to the production origin again.
      var APP_URL = "https://www.tnhiking.club";
      function reopen() {
        window.location.href = APP_URL;
      }
      document.getElementById("retry").addEventListener("click", reopen);
      // Auto-retry the moment the device reports it is back online.
      window.addEventListener("online", reopen);
    </script>
  </body>
</html>
