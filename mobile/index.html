<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Tennessee Hiking Club</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fefcf5;
        color: #2f3b2c;
        text-align: center;
      }
      main {
        max-width: 28rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #555b50;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tennessee Hiking Club</h1>
      <p>
        Connect to the internet once to load the app. After that it keeps
        working on the trail, even with no signal.
      </p>
    </main>
  </body>
</html>
